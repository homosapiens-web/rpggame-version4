<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地牢傳說 2.2 - 打擊感強化版</title>
    <style>
        :root { --hp: #2ecc71; --mp: #3498db; --en: #e74c3c; --bg: #0d0d0d; }
        body { background: #000; color: #fff; font-family: monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 震動與閃爍動畫 */
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-3px, 1px); }
            100% { transform: translate(1px, -2px); }
        }
        .shake { animation: shake 0.15s linear infinite; }
        .flash-red { background: rgba(255, 0, 0, 0.3) !important; }

        /* 漂浮數字動畫 */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }
        .dmg-popup {
            position: absolute; font-weight: bold; font-size: 26px; pointer-events: none;
            animation: floatUp 0.8s ease-out forwards; z-index: 1000; text-shadow: 2px 2px #000;
        }

        #game { width: 420px; height: 850px; background: var(--bg); border: 4px solid #444; position: relative; display: flex; flex-direction: column; overflow: hidden;}
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; background: var(--bg); z-index: 10; }
        .active { display: flex; }

        /* 地圖 UI */
        #map-ui { padding: 12px; background: #111; border-bottom: 3px solid #444; font-size: 14px; }
        #grid-box { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #grid { display: grid; grid-template-columns: repeat(15, 26px); grid-template-rows: repeat(15, 26px); }
        .cell { width: 26px; height: 26px; background-size: 22px; background-repeat: no-repeat; background-position: center; image-rendering: pixelated; }
        
        .w { background-color: #333; } .f { background-color: #111; border: 0.1px solid #1a1a1a; }
        .s { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 7h8V6H1V5h7V4H2V3h6V2H3V1h5V0H0v8h8V7z' fill='white'/%3E%3C/svg%3E"); }
        .c { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 2h6v5H1V2zm0 0h6v2H1V2zm2 2h2v1H3V4z' fill='%23f1c40f'/%3E%3C/svg%3E"); }
        .p { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 1h2v1H3V1zm0 2h2v4H3V3zm-1 0h1v2H2V3zm3 0h1v2H5V3z' fill='%233498db'/%3E%3Cpath d='M6 1h1v5H6V1z' fill='silver'/%3E%3C/svg%3E"); transform: scale(1.4); }

        /* 戰鬥 */
        .battle-view { height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; border-bottom: 4px solid #444; gap: 10px; position: relative; }
        .enemy-container { display: flex; gap: 15px; justify-content: center; width: 100%; }
        .sprite { width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; position: relative; image-rendering: pixelated; transition: 0.1s; }
        .sprite.selected { filter: drop-shadow(0 0 8px #fff); transform: scale(1.2); }
        .sprite.dead { opacity: 0.2; filter: grayscale(1); }
        .en-slime { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4h6v3H1V4zm1-1h4v1H2V3z' fill='%232ecc71'/%3E%3C/svg%3E"); }
        .en-skel { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 1h4v3H2V1zm0 4h1v2H2V5zm3 0h1v2H5V5z' fill='white'/%3E%3C/svg%3E"); }
        .status-tag { position: absolute; top: -15px; width:100%; text-align:center; font-size: 10px; color: yellow; font-weight: bold; }

        .bar-outer { width: 90%; height: 18px; background: #333; border: 2px solid #fff; margin: 4px auto; position: relative; }
        .bar-fill { height: 100%; width: 100%; transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .bar-txt { position: absolute; width: 100%; text-align: center; font-size: 11px; line-height: 18px; font-weight: bold; text-shadow: 1px 1px #000; z-index: 2; }

        /* 日誌顏色 */
        #log { flex-grow: 1; padding: 12px; font-size: 13px; overflow-y: auto; background: #000; border: 1px solid #333; margin: 10px; line-height: 1.6; color: #bbb; }
        .l-dmg { color: #ff7675; } 
        .l-crit { color: #fdcb6e; font-weight: bold; }
        .l-heal { color: #55efc4; }
        .l-sys { color: #a29bfe; }

        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        button { background: #222; color: #fff; border: 2px solid #fff; padding: 12px; cursor: pointer; font-size: 14px; active { background: #444; } }
        
        #ctrls { height: 180px; background: #111; display: flex; justify-content: center; align-items: center; gap: 40px; }
        .joy { display: grid; grid-template-areas: ". u ." "l d r"; gap: 10px; }
        .j-btn { width: 55px; height: 55px; background: #333; border: 2px solid #fff; color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        #msg-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #222; border: 3px solid #f1c40f; padding: 20px; z-index: 1000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="game">
    <div id="msg-box"><div id="msg-content"></div><div id="msg-btns" class="btns" style="padding:0; margin-top:15px"></div></div>

    <div id="start-sc" class="screen active" style="justify-content:center; align-items:center;">
        <h1 style="color:#f1c40f; text-shadow: 4px 4px #811;">地牢傳說 2.2</h1>
        <p style="color:#888">打擊感優化版</p>
        <button onclick="startGame()" style="font-size:20px; padding:15px 50px">踏入地牢</button>
    </div>

    <div id="map-sc" class="screen">
        <div id="map-ui">
            <div style="display:flex; justify-content:space-between">
                <span>FLOOR: <b id="ui-fl" style="color:#f1c40f">1</b> | LV: <b id="ui-lv">1</b></span>
                <span>EXP: <b id="ui-exp">0/100</b></span>
            </div>
            <div style="margin-top:6px; display:flex; justify-content:space-between">
                <span style="color:var(--hp)">HP: <b id="ui-hp">50/50</b></span>
                <span style="color:var(--mp)">MP: <b id="ui-mp">20/20</b></span>
            </div>
        </div>
        <div id="grid-box"><div id="grid"></div></div>
        <div id="ctrls">
            <div class="joy">
                <div class="j-btn" style="grid-area: u" onclick="move(0,-1)">▲</div>
                <div class="j-btn" style="grid-area: l" onclick="move(-1,0)">◀</div>
                <div class="j-btn" style="grid-area: r" onclick="move(1,0)">▶</div>
                <div class="j-btn" style="grid-area: d" onclick="move(0,1)">▼</div>
            </div>
            <button onclick="openStatus()" style="height:60px; width:80px;">狀態</button>
        </div>
    </div>

    <div id="battle-sc" class="screen">
        <div class="battle-view" id="battle-zone">
            <div class="enemy-container" id="enemy-sprites"></div>
            <div class="sprite p" id="player-sprite"></div>
        </div>
        <div class="bar-outer"><div id="hp-en-f" class="bar-fill" style="background:var(--en)"></div><div class="bar-txt" id="txt-en-hp">ENEMY</div></div>
        <div class="bar-outer"><div class="bar-txt" id="txt-pl-hp">HP 50/50</div><div id="hp-pl-f" class="bar-fill" style="background:var(--hp)"></div></div>
        <div class="bar-outer"><div class="bar-txt" id="txt-pl-mp">MP 20/20</div><div id="mp-pl-f" class="bar-fill" style="background:var(--mp)"></div></div>
        <div id="log"></div>
        <div class="btns" id="battle-btns">
            <button onclick="battleAction('atk')">攻擊</button>
            <button onclick="battleAction('mag_menu')">魔法</button>
            <button onclick="battleAction('itm_menu')">道具</button>
            <button onclick="battleAction('run')">逃跑</button>
        </div>
    </div>
</div>

<script>
    const p = {
        lv: 1, exp: 0, nxtExp: 100, hp: 50, mHp: 50, mp: 20, mMp: 20, atk: 10, def: 5, fl: 1, x: 2, y: 2,
        status: "", statusTurn: 0, potions: 2, mPotions: 1, antidotes: 1,
        wAtk: 5, aDef: 2, wName: "木劍 Lv.1", aName: "布衣 Lv.1",
        skills: [{n:"斬擊 I", cost:0, pwr:1.3, type:"atk"}]
    };

    let map = [], enemies = [], currentTarget = 0;
    const size = 15;

    // --- 反饋特效系統 ---
    function showDmg(val, isCrit, element, color) {
        if(!element) return;
        const rect = element.getBoundingClientRect();
        const popup = document.createElement('div');
        popup.className = 'dmg-popup';
        popup.innerText = val + (isCrit ? "!!" : "");
        popup.style.color = color || (isCrit ? "#f1c40f" : "#ff7675");
        popup.style.left = (rect.left + rect.width/2 - 10) + "px";
        popup.style.top = (rect.top - 20) + "px";
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
    }

    function triggerImpact(isHeavy) {
        const game = document.getElementById('game');
        game.classList.add('shake');
        if(isHeavy) game.classList.add('flash-red');
        setTimeout(() => {
            game.classList.remove('shake', 'flash-red');
        }, isHeavy ? 200 : 100);
    }

    // --- 核心遊戲邏輯 ---
    function startGame() {
        showScreen('map-sc'); generateMap();
        window.onkeydown = e => {
            const k = e.key.toLowerCase();
            if(k=='w'||k=='arrowup') move(0,-1); if(k=='s'||k=='arrowdown') move(0,1);
            if(k=='a'||k=='arrowleft') move(-1,0); if(k=='d'||k=='arrowright') move(1,0);
        };
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function generateMap() {
        map = Array(size).fill().map(() => Array(size).fill('w'));
        let x=2, y=2; p.x=x; p.y=y;
        for(let i=0; i<120; i++){
            map[y][x]='f';
            let d = Math.floor(Math.random()*4);
            if(d==0 && y>1) y--; else if(d==1 && y<size-2) y++;
            else if(d==2 && x>1) x--; else if(d==3 && x<size-2) x++;
        }
        map[y][x]='s';
        for(let i=0; i<5; i++){
            let rx=Math.floor(Math.random()*(size-2))+1, ry=Math.floor(Math.random()*(size-2))+1;
            if(map[ry][rx]=='f') map[ry][rx]='c';
        }
        drawMap();
    }

    function drawMap() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const fragment = document.createDocumentFragment();
        for(let y=0; y<size; y++){
            for(let x=0; x<size; x++){
                const c = document.createElement('div');
                c.className = `cell ${map[y][x]}`;
                if(x==p.x && y==p.y) { const pl = document.createElement('div'); pl.className='p cell'; c.appendChild(pl); }
                fragment.appendChild(c);
            }
        }
        grid.appendChild(fragment); updateUI();
    }

    function move(dx, dy) {
        if(!document.getElementById('map-sc').classList.contains('active')) return;
        let nx=p.x+dx, ny=p.y+dy;
        if(nx<0||nx>=size||ny<0||ny>=size||map[ny][nx]=='w') return;
        p.x=nx; p.y=ny;
        if(map[ny][nx]=='s'){ p.fl++; customMsg(`進入 FL.${p.fl}`, () => generateMap()); }
        else if(map[ny][nx]=='c'){ openChest(); map[ny][nx]='f'; drawMap(); }
        else { drawMap(); if(Math.random() < 0.15) startBattle(); }
    }

    function openChest() {
        const lootType = Math.random();
        if(lootType < 0.5) { 
            let lvl = Math.max(1, p.fl + (Math.random()>0.5?1:0));
            let isW = Math.random() > 0.5;
            let n = (isW?"長劍":"護甲") + " Lv." + lvl; let v = lvl * 6;
            customChoice(`發現裝備：${n} (+${v})<br>目前：${isW?p.wName:p.aName}<br>是否更換？`, [
                {t:"換上", f:() => { if(isW){p.wAtk=v; p.wName=n;}else{p.aDef=v; p.aName=n;} updateUI(); }},
                {t:"丟棄", f:() => {}}
            ]);
        } else {
            let item = Math.random() > 0.5 ? "補血藥" : "補魔藥";
            if(item=="補血藥") p.potions++; else p.mPotions++;
            customMsg(`寶箱裡有 ${item}！`);
        }
    }

    function startBattle() {
        enemies = [];
        let count = Math.min(3, 1 + Math.floor(p.fl / 4));
        let scale = 1 + (p.fl * 0.3);
        for(let i=0; i<count; i++){
            enemies.push({
                n: (p.fl%5==0?"【精英】":"")+"怪獸 "+(i+1), h: Math.floor(40*scale), mH: Math.floor(40*scale), a: Math.floor(8*scale),
                img: Math.random()>0.5?"en-slime":"en-skel", st: "", stT: 0
            });
        }
        currentTarget = 0; document.getElementById('log').innerHTML = "";
        addLog("遭遇敵人！", "l-sys");
        showScreen('battle-sc'); renderEnemies(); updateBattleUI();
    }

    function renderEnemies() {
        const box = document.getElementById('enemy-sprites'); box.innerHTML = '';
        enemies.forEach((en, i) => {
            const div = document.createElement('div');
            div.className = `sprite ${en.img} ${i==currentTarget?'selected':''} ${en.h<=0?'dead':''}`;
            div.onclick = () => { if(en.h>0){currentTarget = i; renderEnemies(); updateBattleUI();} };
            if(en.st) div.innerHTML = `<span class="status-tag">${en.st}</span>`;
            box.appendChild(div);
        });
    }

    function autoTarget() {
        if(enemies[currentTarget].h <= 0) {
            let next = enemies.findIndex(e => e.h > 0);
            if(next !== -1) currentTarget = next;
        }
    }

    function battleAction(type) {
        if(p.status == "麻痺" && Math.random() < 0.5){ addLog("麻痺中無法行動！", "l-sys"); setTimeout(enemyTurn, 500); return; }
        
        let target = enemies[currentTarget];
        let targetEl = document.querySelectorAll('.sprite')[currentTarget];

        if(type=='atk') {
            let isCrit = Math.random() < 0.2;
            let dmg = Math.floor((p.atk + p.wAtk) * (0.9 + Math.random()*0.3) * (isCrit?2:1));
            target.h -= dmg;
            showDmg(dmg, isCrit, targetEl);
            if(isCrit) { triggerImpact(true); addLog(`暴擊！！對 ${target.n} 造成 ${dmg} 傷害`, "l-crit"); }
            else { triggerImpact(false); addLog(`攻擊 ${target.n}，造成 ${dmg} 傷害`, "l-dmg"); }

        } else if(type=='mag_menu') {
            customChoice("魔法技能", p.skills.map(s => ({t:`${s.n}(${s.cost}MP)`, f:() => {
                if(p.mp < s.cost) return addLog("MP不足！", "l-sys");
                p.mp -= s.cost;
                if(s.type=="atk") {
                    let dmg = Math.floor((p.atk+p.wAtk)*s.pwr); target.h -= dmg;
                    showDmg(dmg, true, targetEl, "#3498db");
                    triggerImpact(true);
                    addLog(`技能 ${s.n}！造成 ${dmg} 傷害`, "l-dmg");
                } else if(s.type=="heal") {
                    let heal = Math.floor(p.mHp * 0.4); p.hp = Math.min(p.mHp, p.hp + heal);
                    showDmg(heal, false, document.getElementById('player-sprite'), "#2ecc71");
                    addLog(`聖光！恢復了 ${heal} HP`, "l-heal");
                } else if(s.type=="cleanse") {
                    p.status=""; p.statusTurn=0; addLog("淨化！異常狀態解除", "l-heal");
                }
                nextTurn();
            }}))); return;
        } else if(type=='itm_menu') {
            customChoice("使用道具", [
                {t:`補血藥(${p.potions})`, f:() => { if(p.potions>0){p.potions--; p.hp=Math.min(p.mHp, p.hp+50); showDmg(50,false,document.getElementById('player-sprite'),"#2ecc71"); addLog("使用了補血藥", "l-heal"); nextTurn();} }},
                {t:`補魔藥(${p.mPotions})`, f:() => { if(p.mPotions>0){p.mPotions--; p.mp=Math.min(p.mMp, p.mp+30); addLog("使用了補魔藥", "l-sys"); nextTurn();} }},
                {t:`解毒劑(${p.antidotes})`, f:() => { if(p.antidotes>0){p.antidotes--; p.status=""; addLog("解毒完成", "l-heal"); nextTurn();} }}
            ]); return;
        } else if(type=='run') {
            if(Math.random()>0.5){ customMsg("逃離成功", () => showScreen('map-sc')); return; }
            else addLog("逃跑失敗！", "l-sys");
        }
        nextTurn();
    }

    function nextTurn() {
        autoTarget(); updateBattleUI(); renderEnemies();
        if(enemies.every(e => e.h <= 0)) win(); else setTimeout(enemyTurn, 600);
    }

    function enemyTurn() {
        if(enemies.every(e => e.h <= 0)) return;
        if(p.status=="中毒"){ p.hp -= 5; addLog("中毒失血 5 點...", "l-dmg"); p.statusTurn--; if(p.statusTurn<=0) p.status=""; }
        if(p.status=="麻痺"){ p.statusTurn--; if(p.statusTurn<=0) p.status=""; }
        
        let tookDmg = false;
        enemies.forEach(en => {
            if(en.h <= 0) return;
            let dmg = Math.max(2, en.a - (p.def+p.aDef) + Math.floor(Math.random()*3));
            p.hp -= dmg;
            showDmg(dmg, false, document.getElementById('player-sprite'));
            addLog(`${en.n} 攻擊造成 ${dmg} 傷害`, "l-dmg");
            tookDmg = true;
            if(Math.random()<0.15 && !p.status) { p.status=Math.random()>0.5?"中毒":"麻痺"; p.statusTurn=3; addLog(`陷於 ${p.status}！`, "l-sys"); }
        });
        
        if(tookDmg) triggerImpact(false);
        updateBattleUI();
        if(p.hp <= 0) customMsg("你敗北了...", () => location.reload());
    }

    function win() {
        let exp = enemies.length * (30 + p.fl*10); p.exp += exp;
        customMsg(`戰鬥結束！獲得 ${exp} 經驗`, () => { if(p.exp>=p.nxtExp) levelUp(); showScreen('map-sc'); });
    }

    function levelUp() {
        p.lv++; p.exp-=p.nxtExp; p.nxtExp=Math.floor(p.nxtExp*1.4);
        p.mHp+=20; p.hp=p.mHp; p.mMp+=10; p.mp=p.mMp; p.atk+=4;
        let s = "";
        if(p.lv==2) { p.skills.push({n:"烈火咒 I", cost:12, pwr:3, type:"atk"}); s="學會烈火咒！"; }
        if(p.lv==3) { p.skills.push({n:"淨化術", cost:8, type:"cleanse"}); s="學會淨化術！"; }
        if(p.lv==5) { p.skills.push({n:"聖光術", cost:15, type:"heal"}); s="學會聖光術！"; }
        customMsg(`升級至 LV.${p.lv}！${s}`);
    }

    function addLog(m, cls) { 
        const l=document.getElementById('log'); 
        l.innerHTML+=`<div class="${cls}">> ${m}</div>`; 
        l.scrollTop=l.scrollHeight; 
    }

    function updateUI() {
        document.getElementById('ui-fl').innerText=p.fl; document.getElementById('ui-lv').innerText=p.lv;
        document.getElementById('ui-exp').innerText=`${p.exp}/${p.nxtExp}`;
        document.getElementById('ui-hp').innerText=`${p.hp}/${p.mHp}`; document.getElementById('ui-mp').innerText=`${p.mp}/${p.mMp}`;
    }

    function updateBattleUI() {
        let en = enemies[currentTarget];
        document.getElementById('hp-en-f').style.width=(Math.max(0,en.h)/en.mH*100)+"%";
        document.getElementById('txt-en-hp').innerText=`${en.n} HP: ${Math.max(0,en.h)}/${en.mH}`;
        document.getElementById('hp-pl-f').style.width=(p.hp/p.mHp*100)+"%";
        document.getElementById('mp-pl-f').style.width=(p.mp/p.mMp*100)+"%";
        document.getElementById('txt-pl-hp').innerText=`HP ${p.hp}/${p.mHp} ${p.status?'['+p.status+']':''}`;
        document.getElementById('txt-pl-mp').innerText=`MP ${p.mp}/${p.mMp}`; updateUI();
    }

    function customMsg(txt, cb) {
        const box = document.getElementById('msg-box'); document.getElementById('msg-content').innerHTML = txt;
        const area = document.getElementById('msg-btns'); area.innerHTML = `<button onclick="closeMsg(true)">確定</button>`;
        box.style.display='flex'; window.currentCb = cb;
    }

    function customChoice(txt, opts) {
        const box = document.getElementById('msg-box'); document.getElementById('msg-content').innerHTML = txt;
        const area = document.getElementById('msg-btns'); area.innerHTML = '';
        opts.forEach(o => { const b=document.createElement('button'); b.innerText=o.t; b.onclick=()=>{box.style.display='none'; o.f();}; area.appendChild(b); });
        box.style.display='flex';
    }

    function closeMsg(use) { document.getElementById('msg-box').style.display='none'; if(use && window.currentCb) window.currentCb(); }
    function openStatus() { customMsg(`LV.${p.lv} 騎士<br>攻擊: ${p.atk+p.wAtk}<br>防禦: ${p.def+p.aDef}<br>武器: ${p.wName}<br>防具: ${p.aName}`); }
</script>
</body>
